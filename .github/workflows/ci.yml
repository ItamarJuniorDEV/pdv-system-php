name: CI
on:
  push:
    branches: [main]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist
      - name: Rodar testes
        run: ./vendor/bin/phpunit